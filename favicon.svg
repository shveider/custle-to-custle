<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#2d2d5e"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b7355"/>
      <stop offset="100%" stop-color="#6b5335"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#sky)" stroke="#444" stroke-width="2"/>
  <!-- Stars -->
  <circle cx="16" cy="14" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="48" cy="18" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="22" cy="24" r="1.2" fill="#fff" opacity="0.7"/>
  <!-- Castle body -->
  <rect x="18" y="30" width="28" height="24" fill="url(#stone)" rx="2"/>
  <!-- Battlements -->
  <rect x="18" y="27" width="4" height="5" fill="url(#stone)"/>
  <rect x="24" y="27" width="4" height="5" fill="url(#stone)"/>
  <rect x="30" y="27" width="4" height="5" fill="url(#stone)"/>
  <rect x="36" y="27" width="4" height="5" fill="url(#stone)"/>
  <rect x="42" y="27" width="4" height="5" fill="url(#stone)"/>
  <!-- Gate -->
  <rect x="27" y="42" width="10" height="12" rx="5" ry="5" fill="#2d2d5e"/>
  <rect x="29" y="44" width="6" height="10" rx="3" ry="3" fill="#1a1a3e"/>
  <!-- Towers -->
  <rect x="15" y="26" width="8" height="28" fill="url(#stone)" rx="2"/>
  <rect x="41" y="26" width="8" height="28" fill="url(#stone)" rx="2"/>
  <!-- Tower tops -->
  <polygon points="19,26 23,20 27,26" fill="#9b8365"/>
  <polygon points="45,26 49,20 53,26" fill="#9b8365"/>
  <!-- Flag -->
  <line x1="32" y1="20" x2="32" y2="10" stroke="#c0392b" stroke-width="2"/>
  <polygon points="32,10 38,13 32,16" fill="#e74c3c"/>
  <!-- Moon -->
  <circle cx="46" cy="16" r="5" fill="#f0e68c" opacity="0.9"/>
  <circle cx="48" cy="15" r="4.5" fill="url(#sky)"/>
</svg>

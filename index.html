<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Castle Clash: Age of Mages</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div id="game-over-overlay">
    <div id="game-over-content">
        <h2 id="game-over-title" class="victory">Victory!</h2>
        <p id="game-over-msg">Your castle stands triumphant!</p>
        <button id="btn-play-again">Play Again</button>
    </div>
</div>

<div id="game">
    <header>
        <h1>Castle Clash: Age of Mages</h1>
        <div class="hud">
            <div class="panel">💰 <strong id="gold">0</strong> Gold</div>
            <div class="panel">⏱ <span id="time">0</span>s</div>
            <div class="panel" style="display:flex;gap:8px;align-items:center">
                <button class="small" id="btn-pause">Pause</button>
                <button class="small" id="btn-speed">Speed: 1x</button>
                <label style="display:flex;gap:4px;align-items:center;font-size:12px;cursor:pointer">
                    🔊 <input type="range" id="volume-slider" min="0" max="100" value="50" style="width:60px;cursor:pointer"/>
                </label>
                <button class="small" id="btn-reset">Reset</button>
            </div>
        </div>
    </header>

    <div class="unit-rosters">
        <div class="roster roster-player" id="roster-player"></div>
        <div class="roster roster-ai" id="roster-ai"></div>
    </div>

    <div class="field-container">
        <div id="field">
            <div class="sky-stars"></div>
            <div class="moon"></div>
            <div class="mountains-far"></div>
            <div class="mountains-near"></div>
            <div class="tree-line"></div>

            <div class="castle player" id="castle-player">
                <div class="castle-info">
                    <div class="castle-title">🏰 Player</div>
                    <div class="castle-level-row">
                        <span class="castle-level-label">Lv <strong id="castle-level">1</strong></span>
                        <button class="castle-upgrade-btn" id="castle-upgrade-btn">Upgrade (300g)</button>
                    </div>
                    <div class="hp"><i id="player-hp" style="width:100%"></i></div>
                    <div class="castle-hp-text" id="player-hp-text">1000</div>
                </div>
                <div class="castle-svg">
                    <img src="svg/castle-with-a-flag-on-top-svgrepo-com.svg" alt="Player Castle"
                         style="width:92px;height:92px;filter:brightness(1.3) saturate(1.5);">
                </div>
            </div>

            <canvas id="game-canvas"></canvas>

            <div class="castle ai" id="castle-ai">
                <div class="ai-castle-data-info">💰 <span id="ai-gold">0</span></div>
                <div class="ai-phase-label">Phase: <span id="ai-phase">Idle</span></div>
                <div class="castle-info">
                    <div class="castle-title">⚔️ Enemy</div>
                    <div class="hp"><i id="ai-hp" style="width:100%"></i></div>
                    <div class="castle-hp-text" id="ai-hp-text">2000</div>
                </div>
                <div class="castle-svg">
                    <img src="svg/castle-fortress-svgrepo-com.svg" alt="AI Castle"
                         style="width:92px;height:92px;filter:brightness(0.82) saturate(0.58) hue-rotate(170deg);">
                </div>
            </div>

            <div class="ground"></div>
        </div>
    </div>

    <div id="ui">
        <div class="deck">
            <button class="card" data-unit="swordsman">
                <span class="key-hint">1</span>
                <span class="card-icon">⚔️</span>
                <span class="card-name">Swordsman</span>
                <span class="cost">50</span>
                <div class="card-tooltip">
                    <div class="tooltip-name">Swordsman</div>
                    <div class="tooltip-desc">Fast melee infantry</div>
                    <div class="tooltip-stats">
                        <span>HP: <span class="tooltip-hp">150</span></span>
                        <span>DMG: <span class="tooltip-dmg">10</span></span>
                        <span>SPD: <span class="tooltip-spd">0.8</span></span>
                        <span>RNG: <span class="tooltip-rng">46</span></span>
                        <span>Cost: <span class="tooltip-cost">50</span></span>
                    </div>
                    <div class="tooltip-ability">🛡️ Shield Block (20% chance to negate damage)</div>
                </div>
            </button>
            <button class="card" data-unit="archer">
                <span class="key-hint">2</span>
                <span class="card-icon">🏹</span>
                <span class="card-name">Archer</span>
                <span class="cost">100</span>
                <div class="card-tooltip">
                    <div class="tooltip-name">Archer</div>
                    <div class="tooltip-desc">Versatile ranged attacker</div>
                    <div class="tooltip-stats">
                        <span>HP: <span class="tooltip-hp">65</span></span>
                        <span>DMG: <span class="tooltip-dmg">20</span></span>
                        <span>SPD: <span class="tooltip-spd">1.0</span></span>
                        <span>RNG: <span class="tooltip-rng">160</span></span>
                        <span>Cost: <span class="tooltip-cost">100</span></span>
                    </div>
                    <div class="tooltip-ability">🎯 Piercing (+50% damage vs Hero units)</div>
                </div>
            </button>
            <button class="card" data-unit="mage">
                <span class="key-hint">3</span>
                <span class="card-icon">🔮</span>
                <span class="card-name">Mage</span>
                <span class="cost">120</span>
                <div class="card-tooltip">
                    <div class="tooltip-name">Mage</div>
                    <div class="tooltip-desc">Powerful spellcaster</div>
                    <div class="tooltip-stats">
                        <span>HP: <span class="tooltip-hp">70</span></span>
                        <span>DMG: <span class="tooltip-dmg">40</span></span>
                        <span>SPD: <span class="tooltip-spd">2</span></span>
                        <span>RNG: <span class="tooltip-rng">170</span></span>
                        <span>Cost: <span class="tooltip-cost">120</span></span>
                    </div>
                    <div class="tooltip-ability">⚡ Chain Lightning (50% damage to nearby enemies)</div>
                </div>
            </button>
            <button class="card" data-unit="tank">
                <span class="key-hint">4</span>
                <span class="card-icon">🛡️</span>
                <span class="card-name">Tank</span>
                <span class="cost">200</span>
                <div class="card-tooltip">
                    <div class="tooltip-name">Tank</div>
                    <div class="tooltip-desc">Heavy armored defender</div>
                    <div class="tooltip-stats">
                        <span>HP: <span class="tooltip-hp">650</span></span>
                        <span>DMG: <span class="tooltip-dmg">5</span></span>
                        <span>SPD: <span class="tooltip-spd">0.5</span></span>
                        <span>RNG: <span class="tooltip-rng">48</span></span>
                        <span>Cost: <span class="tooltip-cost">200</span></span>
                    </div>
                    <div class="tooltip-ability">🛡️ Shield Block (80% chance to negate damage)</div>
                </div>
            </button>
            <button class="card" data-unit="supreme">
                <span class="key-hint">5</span>
                <span class="card-icon">✨</span>
                <span class="card-name">Supreme</span>
                <span class="cost">200</span>
                <div class="card-tooltip">
                    <div class="tooltip-name">Supreme</div>
                    <div class="tooltip-desc">Long-range siege unit</div>
                    <div class="tooltip-stats">
                        <span>HP: <span class="tooltip-hp">50</span></span>
                        <span>DMG: <span class="tooltip-dmg">80</span></span>
                        <span>SPD: <span class="tooltip-spd">0.35</span></span>
                        <span>RNG: <span class="tooltip-rng">300</span></span>
                        <span>Cost: <span class="tooltip-cost">200</span></span>
                    </div>
                    <div class="tooltip-ability">🌟 Line Attack & 3x damage vs castles</div>
                </div>
            </button>
            <button class="card" data-unit="necromancer">
                <span class="key-hint">7</span>
                <span class="card-icon">💀</span>
                <span class="card-name">Necromancer</span>
                <span class="cost">180</span>
                <div class="card-tooltip">
                    <div class="tooltip-name">Necromancer</div>
                    <div class="tooltip-desc">Dark summoner</div>
                    <div class="tooltip-stats">
                        <span>HP: <span class="tooltip-hp">60</span></span>
                        <span>DMG: <span class="tooltip-dmg">25</span></span>
                        <span>SPD: <span class="tooltip-spd">0.7</span></span>
                        <span>RNG: <span class="tooltip-rng">200</span></span>
                        <span>Cost: <span class="tooltip-cost">180</span></span>
                    </div>
                    <div class="tooltip-ability">💀 Summon Skeleton (20% chance on attack)</div>
                </div>
            </button>
            <button class="card" data-unit="giant">
                <span class="key-hint">8</span>
                <span class="card-icon">🗿</span>
                <span class="card-name">Giant</span>
                <span class="cost">350</span>
                <div class="card-tooltip">
                    <div class="tooltip-name">Giant</div>
                    <div class="tooltip-desc">Massive melee powerhouse</div>
                    <div class="tooltip-stats">
                        <span>HP: <span class="tooltip-hp">800</span></span>
                        <span>DMG: <span class="tooltip-dmg">60</span></span>
                        <span>SPD: <span class="tooltip-spd">0.4</span></span>
                        <span>RNG: <span class="tooltip-rng">60</span></span>
                        <span>Cost: <span class="tooltip-cost">350</span></span>
                    </div>
                    <div class="tooltip-ability">💥 Area Attack (50% chance, 60px radius)</div>
                </div>
            </button>
            <button class="card" data-unit="healer">
                <span class="key-hint">9</span>
                <span class="card-icon">💚</span>
                <span class="card-name">Healer</span>
                <span class="cost">150</span>
                <div class="card-tooltip">
                    <div class="tooltip-name">Healer</div>
                    <div class="tooltip-desc">Splash heals multiple ally units in range</div>
                    <div class="tooltip-stats">
                        <span>HP: <span class="tooltip-hp">100</span></span>
                        <span>DMG: <span class="tooltip-dmg">0</span></span>
                        <span>SPD: <span class="tooltip-spd">1.2</span></span>
                        <span>RNG: <span class="tooltip-rng">150</span></span>
                        <span>Cost: <span class="tooltip-cost">150</span></span>
                    </div>
                    <div class="tooltip-ability">✨ Splash Heal (12 HP to allies in 100 range)</div>
                </div>
            </button>
            <button class="card" data-unit="hero">
                <span class="key-hint">6</span>
                <span class="card-icon">⭐</span>
                <span class="card-name">Hero</span>
                <span class="cost">FREE</span>
            </button>
            <div class="hero-stats">
                <div class="stat-row">Hero:</div>
                <div class="stat-row"><span>HP:</span><span id="hero-hp-stat">300</span></div>
                <div class="stat-row"><span>DMG:</span><span id="hero-dmg-stat">40</span></div>
                <div class="stat-row"><span>SPD:</span><span id="hero-spd-stat">1.0</span></div>
            </div>
        </div>

        <div class="bottom-left">
            <div class="panel">⭐ Hero Level: <strong id="hero-level">1</strong></div>
            <div class="panel">
                XP: <span id="hero-exp-text">0/100</span>
                <div class="xp" style="margin-top:6px"><i id="hero-xp-bar" style="width:0%"></i></div>
            </div>
        </div>

    </div>

    <footer>Press 1–9 to deploy units &nbsp;·&nbsp; G = +1000 gold &nbsp;·&nbsp; K = damage enemy castle</footer>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
